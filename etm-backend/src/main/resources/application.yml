server:
  port: 8080
  servlet:
    context-path: /

spring:
  profiles:
    active: dev
  application:
    name: etm-backend
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: del_flag
      logic-delete-value: 2
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT 配置
jwt:
  secret: etm-secret-key-2024-must-be-at-least-256-bits-long-for-hs256
  expiration: 86400      # Token 有效期（秒），24小时
  refresh-expiration: 604800  # 刷新 Token 有效期（秒），7天

# 文件存储
file:
  upload-path: /tmp/etm-uploads
  access-prefix: /files

# Knife4j API 文档
knife4j:
  enable: true
  setting:
    language: zh_cn
